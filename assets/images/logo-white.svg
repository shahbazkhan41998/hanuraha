<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hanuruha Logo WHITE version - Woman with open arms and leaf petals -->
  
  <!-- Center petal (top) -->
  <ellipse cx="100" cy="42" rx="7" ry="18" fill="#FFFFFF" transform="rotate(0,100,60)"/>
  
  <!-- Left petals -->
  <ellipse cx="100" cy="42" rx="6" ry="16" fill="#FFFFFF" transform="rotate(-25,100,60)"/>
  <ellipse cx="100" cy="42" rx="6" ry="16" fill="#FFFFFF" transform="rotate(-50,100,60)"/>
  <ellipse cx="100" cy="44" rx="5.5" ry="14" fill="#FFFFFF" transform="rotate(-75,100,60)"/>
  
  <!-- Right petals -->
  <ellipse cx="100" cy="42" rx="6" ry="16" fill="#FFFFFF" transform="rotate(25,100,60)"/>
  <ellipse cx="100" cy="42" rx="6" ry="16" fill="#FFFFFF" transform="rotate(50,100,60)"/>
  <ellipse cx="100" cy="44" rx="5.5" ry="14" fill="#FFFFFF" transform="rotate(75,100,60)"/>
  
  <!-- Head circle -->
  <circle cx="100" cy="75" r="12" fill="#FFFFFF"/>
  
  <!-- Body - curved figure -->
  <path d="M100,87 C100,87 85,100 78,115 C71,130 80,148 100,148 C120,148 129,130 122,115 C115,100 100,87 100,87 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Arms spread wide -->
  <path d="M88,100 C80,92 65,82 52,78" fill="none" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M112,100 C120,92 135,82 148,78" fill="none" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round"/>
  
  <!-- Small dots at hand tips -->
  <circle cx="50" cy="77" r="4" fill="#FFFFFF"/>
  <circle cx="150" cy="77" r="4" fill="#FFFFFF"/>
</svg>
